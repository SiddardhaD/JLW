name: jlw_approvals
description: Secure enterprise order approvals app for JLW built in Flutter.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  provider: ^6.0.5
  http: ^1.2.2
  intl: ^0.18.1
  pdfx: ^2.9.2
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
